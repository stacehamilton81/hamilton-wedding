<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Hamilton Wedding Invitation</title>
</head>
<body style="margin: 0; padding: 0; background-color: #faf8eb; font-family: 'Montserrat', Helvetica, Arial, sans-serif;">
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #faf8eb; padding: 40px 0;">
    <tr>
      <td align="center">
        
        <table border="0" cellpadding="0" cellspacing="0" width="450" style="background-color: #faf8eb; border: 1px solid #333333; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
          
          <tr>
            <td align="center" style="padding: 40px 40px 20px 40px;">
              <img src="http://localhost:3000/img/logo.png" alt="Destiny & Stace">
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 0 40px 40px 40px;">
              <h1 style="color: #253225; font-size: 32px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -1px; line-height: 1.1;">
                The Hamilton<br>
                <span style="font-weight: 200; opacity: 0.8;">Wedding</span>
              </h1>
              
              <p style="color: #253225; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; margin: 20px 0 10px 0;">
                September 5, 2026 • Campio Ritchie
              </p>
              
              <p style="color: #4d4d4d; font-size: 15px; line-height: 1.6; margin-bottom: 30px;">
                We would love for you to join us for an intimate celebration.<br>
                Please confirm your attendance via the link below.
              </p>

              <table border="0" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" bgcolor="#d0006f" style="border-radius: 16px;">
                    <a href="https://your-wedding-site.vercel.app/rsvp?id={{guest_uuid}}" target="_blank" style="padding: 18px 36px; font-size: 14px; color: #ffffff; font-weight: 900; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; display: inline-block;">
                      Confirm RSVP
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        <table border="0" cellpadding="0" cellspacing="0" width="450">
          <tr>
            <td align="center" style="padding: 30px; color: #444444; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">
              With Love, Destiny & Stace
            </td>
          </tr>
        </table>
